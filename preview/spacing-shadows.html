<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3)}

body{background:var(--ff-paper)}
.row{display:flex;gap:22px;margin-top:16px;flex-wrap:wrap}
.b{width:120px;height:64px;background:#fff;border-radius:var(--r-md)}
.n{font-family:var(--font-cond);font-size:11px;color:var(--fg-3);margin-top:10px;text-align:center}
</style></head><body><div class="cap">Elevation</div><div class="row">
<div><div class="b" style="box-shadow:var(--sh-sm)"></div><div class="n">sm · resting</div></div>
<div><div class="b" style="box-shadow:var(--sh-md)"></div><div class="n">md · hover</div></div>
<div><div class="b" style="box-shadow:var(--sh-lg)"></div><div class="n">lg · overlay</div></div>
<div><div class="b" style="box-shadow:var(--sh-brand)"></div><div class="n">brand · CTA glow</div></div>
</div></body></html>

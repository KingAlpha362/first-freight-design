<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px;}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);}

.r{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid var(--ff-line)}
.r:last-child{border:0}
.tag{font-family:var(--font-cond);font-size:11px;color:var(--fg-3);width:54px;flex:none}
.s{font-family:var(--font-body)}

</style></head><body><div class="cap" style="margin-bottom:8px">Body — Barlow</div>
<div class="r"><span class="tag">H3 24</span><span class="s" style="font-size:24px;font-weight:700">Nationwide overnight freight</span></div>
<div class="r"><span class="tag">H4 19</span><span class="s" style="font-size:19px;font-weight:600">Three depots, one network</span></div>
<div class="r"><span class="tag">Body 16</span><span class="s" style="font-size:16px;font-weight:400;color:var(--fg-2)">We move parcels between Johannesburg, Durban and Cape Town — on time, every day.</span></div>
<div class="r"><span class="tag">Small 14</span><span class="s" style="font-size:14px;color:var(--fg-2)">Track your shipment with your waybill number.</span></div></body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px;}
.row{display:flex;gap:12px;flex-wrap:wrap}

.sw{flex:1;min-width:120px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--ff-line)}
.chip{height:78px}
.meta{padding:8px 10px;background:var(--ff-white)}
.nm{font-weight:700;font-size:13px}
.hx{font-family:var(--font-cond);font-size:12px;color:var(--fg-3);letter-spacing:.04em}

</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--ff-red)"></div><div class="meta"><div class="nm" style="color:var(--ff-red)">Brand Red</div><div class="hx">#DE4632</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-red-deep)"></div><div class="meta"><div class="nm">Red Deep</div><div class="hx">#B8341F</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-orange)"></div><div class="meta"><div class="nm" style="color:var(--ff-orange)">Hi-Vis Orange</div><div class="hx">#F26A21</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-orange-lt)"></div><div class="meta"><div class="nm">Orange Light</div><div class="hx">#FB8B3D</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-ink)"></div><div class="meta"><div class="nm">Ink</div><div class="hx">#1A1A1A</div></div></div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px;}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);}

.big{font-family:var(--font-display);font-weight:700;font-style:italic;font-size:54px;line-height:1.02;color:var(--ff-ink);letter-spacing:-.01em}
.sub{font-family:var(--font-display);font-weight:600;font-size:26px;margin-top:10px;color:var(--fg-1)}
.meta{margin-top:12px}

</style></head><body><div class="cap">Display — Zilla Slab</div>
<div class="big">Your Parcel,<br>Our Priority.</div>
<div class="sub">The First Freight National Fleet</div>
<div class="meta cap">700 italic display · 600 headings · echoes the slab-serif wordmark</div></body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px;}
.row{display:flex;gap:12px;flex-wrap:wrap}

.sw{flex:1;min-width:96px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--ff-line)}
.chip{height:64px}.meta{padding:7px 9px}.nm{font-weight:600;font-size:12px}
.hx{font-family:var(--font-cond);font-size:11px;color:var(--fg-3)}

</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--ff-white)"></div><div class="meta"><div class="nm">White</div><div class="hx">#FFFFFF</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-paper)"></div><div class="meta"><div class="nm">Paper</div><div class="hx">#F7F5F2</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-mist)"></div><div class="meta"><div class="nm">Mist</div><div class="hx">#EEEDE9</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-line)"></div><div class="meta"><div class="nm">Line</div><div class="hx">#E0DDD6</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-steel)"></div><div class="meta"><div class="nm">Steel</div><div class="hx">#8A9197</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-slate)"></div><div class="meta"><div class="nm" style="color:#fff">Slate</div><div class="hx">#5E5A53</div></div></div>
<div class="sw"><div class="chip" style="background:var(--ff-graphite)"></div><div class="meta"><div class="nm">Graphite</div><div class="hx">#2B2A28</div></div></div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3)}

.box{background:var(--ff-graphite);border-radius:var(--r-md);padding:30px 28px;color:#fff;overflow:hidden;position:relative}
.t{font-family:var(--font-display);font-weight:700;font-style:italic;font-size:40px;line-height:1.02;color:var(--ff-orange)}
.s{font-family:var(--font-cond);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:#fff;opacity:.7;margin-top:12px}
</style></head><body><div class="cap" style="margin-bottom:10px">Tagline lockup</div>
<div class="box"><div class="t">Your Parcel,<br>Our Priority.</div><div class="s">First Freight Couriers (Pty) Ltd</div></div></body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px;}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);}

.lab{font-family:var(--font-cond);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ff-red)}
.code{font-family:var(--font-cond);font-weight:600;font-size:22px;letter-spacing:.08em;color:var(--ff-ink)}
.box{display:inline-block;border:1px solid var(--ff-line-2);border-radius:var(--r-sm);padding:6px 12px;margin-right:8px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}

</style></head><body><div class="cap" style="margin-bottom:8px">Labels & Codes — Barlow Semi Condensed</div>
<div class="lab">Johannesburg · Durban · Cape Town</div>
<div class="row">
<span class="box"><span class="code">FF-2840-117</span></span>
<span class="box"><span class="code">T24</span></span>
<span class="box"><span class="code">B18</span></span>
</div>
<div class="cap" style="margin-top:14px">Uppercase tracking · fleet codes · branch tags</div></body></html>

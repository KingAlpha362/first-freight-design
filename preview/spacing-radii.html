<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3)}

.row{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.b{width:78px;height:62px;background:var(--ff-mist);border:1px solid var(--ff-line-2)}
.n{font-family:var(--font-cond);font-size:11px;color:var(--fg-3);margin-top:6px;text-align:center}
</style></head><body><div class="cap">Corner radii</div><div class="row">
<div><div class="b" style="border-radius:3px"></div><div class="n">xs · 3</div></div><div><div class="b" style="border-radius:6px"></div><div class="n">sm · 6</div></div><div><div class="b" style="border-radius:10px"></div><div class="n">md · 10</div></div><div><div class="b" style="border-radius:16px"></div><div class="n">lg · 16</div></div><div><div class="b" style="border-radius:999px"></div><div class="n">pill · ∞</div></div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3)}

.row{display:flex;align-items:flex-end;gap:14px;margin-top:14px}
.u{text-align:center}
.bar{background:var(--ff-orange);border-radius:3px;width:34px}
.n{font-family:var(--font-cond);font-size:11px;color:var(--fg-3);margin-top:6px}
</style></head><body><div class="cap">Spacing — 8pt scale</div><div class="row">
<div class="u"><div class="bar" style="height:4px"></div><div class="n">4</div></div><div class="u"><div class="bar" style="height:8px"></div><div class="n">8</div></div><div class="u"><div class="bar" style="height:12px"></div><div class="n">12</div></div><div class="u"><div class="bar" style="height:16px"></div><div class="n">16</div></div><div class="u"><div class="bar" style="height:24px"></div><div class="n">24</div></div><div class="u"><div class="bar" style="height:32px"></div><div class="n">32</div></div><div class="u"><div class="bar" style="height:48px"></div><div class="n">48</div></div><div class="u"><div class="bar" style="height:64px"></div><div class="n">64</div></div>
</div></body></html>

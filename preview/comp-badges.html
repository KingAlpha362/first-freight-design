<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ff-white);color:var(--fg-1);padding:22px}
.cap{font-family:var(--font-cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
/* buttons */
.btn{font-family:var(--font-body);font-weight:600;font-size:15px;border-radius:var(--r-sm);padding:11px 20px;border:1.5px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all var(--dur) var(--ease)}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--ff-red);color:#fff;box-shadow:var(--sh-brand)}
.btn-primary:hover{background:var(--ff-red-deep)}
.btn-ghost{background:transparent;color:var(--ff-red);border-color:var(--ff-red)}
.btn-ghost:hover{background:rgba(222,70,50,.08)}
.btn-dark{background:var(--ff-ink);color:#fff}
.btn-sm{font-size:13px;padding:7px 14px}

.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r-pill);font-size:13px;font-weight:600}
.dot{width:8px;height:8px;border-radius:50%}
.tag{font-family:var(--font-cond);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:var(--r-xs);border:1px solid var(--ff-line-2);color:var(--fg-2)}
</style></head><body><div class="cap" style="margin-bottom:12px">Status pills & tags</div>
<div class="row" style="margin-bottom:14px">
<span class="pill" style="background:rgba(46,139,87,.14);color:#2E8B57"><span class="dot" style="background:#2E8B57"></span>Delivered</span>
<span class="pill" style="background:rgba(242,106,33,.16);color:#C7560F"><span class="dot" style="background:var(--ff-orange)"></span>In Transit</span>
<span class="pill" style="background:rgba(201,162,39,.18);color:#8A6D00"><span class="dot" style="background:var(--pending)"></span>Awaiting</span>
<span class="pill" style="background:rgba(197,52,31,.14);color:#C5341F"><span class="dot" style="background:var(--alert)"></span>Exception</span>
</div>
<div class="row">
<span class="tag">Johannesburg</span><span class="tag">Durban</span><span class="tag">Cape Town</span><span class="tag" style="border-color:var(--ff-red);color:var(--ff-red)">Priority</span>
</div></body></html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>First Freight Couriers — Website UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--fg-1); background: var(--ff-white); }
    a { color: inherit; }

    .ff-eyebrow {
      font-family: var(--font-cond); font-weight: 700; font-size: 12.5px;
      letter-spacing: .14em; text-transform: uppercase; display: inline-block;
    }

    /* primary red CTA (solid) */
    .ff-cta-red {
      font-family: var(--font-cond); font-weight: 700; font-size: 14px; letter-spacing: .07em;
      text-transform: uppercase; background: var(--ff-red); color: #fff; border: 0; cursor: pointer;
      padding: 14px 26px; border-radius: var(--r-sm); display: inline-flex; align-items: center;
      gap: 9px; white-space: nowrap; box-shadow: var(--sh-brand); transition: all 180ms var(--ease);
    }
    .ff-cta-red:hover { background: var(--ff-red-deep); transform: translateY(-1px); }
    .ff-cta-red:active { transform: translateY(1px) scale(.99); }

    /* outline / line CTA */
    .ff-cta-line {
      font-family: var(--font-cond); font-weight: 700; font-size: 14px; letter-spacing: .07em;
      text-transform: uppercase; background: transparent; color: var(--ff-ink);
      border: 1.5px solid var(--ff-line-2); cursor: pointer; padding: 13px 24px;
      border-radius: var(--r-sm); display: inline-flex; align-items: center; gap: 9px;
      white-space: nowrap; transition: all 180ms var(--ease);
    }
    .ff-cta-line:hover { border-color: var(--ff-red); color: var(--ff-red); }

    @keyframes ffFade { from { opacity: 0; } to { opacity: .92; } }
  </style>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.378.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="FeatureRow.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="CtaBand.jsx"></script>
  <script type="text/babel" src="Capabilities.jsx"></script>
  <script type="text/babel" src="QuoteForm.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="TrackingModal.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroLayout": "full",
      "heroOverlay": 55,
      "brandColor": "#DE4632",
      "showTopBar": true
    }/*EDITMODE-END*/;

    // darken a hex by a ratio (for the pressed/hover red)
    function darken(hex, r) {
      const n = parseInt(hex.slice(1), 16);
      const f = (1 - r);
      const cl = v => Math.max(0, Math.round(v * f));
      return '#' + [cl((n >> 16) & 255), cl((n >> 8) & 255), cl(n & 255)]
        .map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [track, setTrack] = useState(null);
      const scrollRef = useRef(null);

      useEffect(() => { if (window.lucide) lucide.createIcons(); });

      // live-apply brand colour to the CSS variables
      useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--ff-red', t.brandColor);
        root.style.setProperty('--ff-red-deep', darken(t.brandColor, 0.16));
      }, [t.brandColor]);

      const goQuote = () => {
        const root = scrollRef.current;
        const el = root && root.querySelector('#quote');
        if (el) root.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div ref={scrollRef} className="kit-scroll" style={{ height: '100vh', overflowY: 'auto' }}>
          {t.showTopBar && <TopBar />}
          <Header onTrack={() => setTrack('FF-2840-117')} onQuote={goQuote} />
          <Hero onQuote={goQuote} onTrackSubmit={(wb) => setTrack(wb)}
                full={t.heroLayout === 'full'} overlay={t.heroOverlay} />
          <FeatureRow />
          <About />
          <Services />
          <CtaBand onQuote={goQuote} />
          <Capabilities />
          <QuoteForm />
          <Footer />
          {track && <TrackingModal waybill={track} onClose={() => setTrack(null)} />}

          <TweaksPanel>
            <TweakSection label="Hero" />
            <TweakRadio label="Layout" value={t.heroLayout}
              options={[{ value: 'angled', label: 'Angled' }, { value: 'full', label: 'Full image' }]}
              onChange={(v) => setTweak('heroLayout', v)} />
            <TweakSlider label="Image darkness" value={t.heroOverlay} min={20} max={85} unit="%"
              onChange={(v) => setTweak('heroOverlay', v)} />
            <TweakSection label="Brand" />
            <TweakColor label="Brand colour" value={t.brandColor}
              options={['#DE4632', '#C8102E', '#E2680F', '#B8341F', '#1F6FB2']}
              onChange={(v) => setTweak('brandColor', v)} />
            <TweakSection label="Layout" />
            <TweakToggle label="Utility top bar" value={t.showTopBar}
              onChange={(v) => setTweak('showTopBar', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

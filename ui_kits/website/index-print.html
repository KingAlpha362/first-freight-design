<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>First Freight Couriers — Website</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--fg-1); background: var(--ff-paper); }
    a { color: inherit; }

    .ff-eyebrow {
      font-family: var(--font-cond); font-weight: 700; font-size: 12.5px;
      letter-spacing: .16em; text-transform: uppercase; display: inline-block;
    }
    .ff-cta-red {
      font-family: var(--font-cond); font-weight: 700; font-size: 14px; letter-spacing: .07em;
      text-transform: uppercase; background: var(--ff-red); color: #fff; border: 0; cursor: pointer;
      padding: 14px 26px; border-radius: var(--r-sm); display: inline-flex; align-items: center;
      gap: 9px; white-space: nowrap; box-shadow: var(--sh-brand); transition: all 180ms var(--ease);
    }
    .ff-cta-red:hover { background: var(--ff-red-deep); transform: translateY(-1px); }
    .ff-cta-red:active { transform: translateY(1px) scale(.99); }

    input::placeholder { color: var(--ff-fog); }

    @keyframes ffFade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dashmove { to { stroke-dashoffset: -28; } }
    @keyframes pulsering { 0% { r: 13; opacity: .6; } 100% { r: 30; opacity: 0; } }

    .reduce-motion *, .reduce-motion svg * { animation-play-state: paused !important; }

    /* ---- Print ---- */
    @page { size: A4 portrait; margin: 0; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      html, body { background: var(--ff-paper) !important; }
      /* unclip the scroll container so the whole page flows across pages */
      .kit-scroll { height: auto !important; overflow: visible !important; }
      /* header should not stick/repeat in print */
      header { position: static !important; background: #fff !important; backdrop-filter: none !important; border-bottom: 1px solid var(--ff-line) !important; }
      /* hide interactive-only chrome */
      .twk-panel, [data-omelette-chrome] { display: none !important; }
      /* keep sections from splitting awkwardly */
      section, footer { break-inside: avoid; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.378.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="DHeader.jsx"></script>
  <script type="text/babel" src="DHero.jsx"></script>
  <script type="text/babel" src="DEvolution.jsx"></script>
  <script type="text/babel" src="DStats.jsx"></script>
  <script type="text/babel" src="DServices.jsx"></script>
  <script type="text/babel" src="DGallery.jsx"></script>
  <script type="text/babel" src="DFeatures.jsx"></script>
  <script type="text/babel" src="DMap.jsx"></script>
  <script type="text/babel" src="DFaq.jsx"></script>
  <script type="text/babel" src="DContact.jsx"></script>
  <script type="text/babel" src="DFooter.jsx"></script>
  <script type="text/babel" src="QuoteForm.jsx"></script>
  <script type="text/babel" src="TrackingModal.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "brandColor": "#B8341F",
      "heroScrim": 72,
      "reduceMotion": false
    }/*EDITMODE-END*/;

    function darken(hex, r) {
      const n = parseInt(hex.slice(1), 16), f = (1 - r);
      const cl = v => Math.max(0, Math.round(v * f));
      return '#' + [cl((n >> 16) & 255), cl((n >> 8) & 255), cl(n & 255)].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [track, setTrack] = useState(null);
      const [quoteOpen, setQuoteOpen] = useState(false);
      const scrollRef = useRef(null);

      useEffect(() => { if (window.lucide) lucide.createIcons(); });
      useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--ff-red', t.brandColor);
        root.style.setProperty('--ff-red-deep', darken(t.brandColor, 0.16));
      }, [t.brandColor]);

      return (
        <div ref={scrollRef} className={'kit-scroll' + (t.reduceMotion ? ' reduce-motion' : '')}
             style={{ height: '100vh', overflowY: 'auto', overflowX: 'hidden' }}>
          <DHeader onTrack={() => setTrack('FF-2840-117')} onQuote={() => setQuoteOpen(true)} />
          <DHero onQuote={() => setQuoteOpen(true)} onTrackSubmit={(wb) => setTrack(wb)} scrim={t.heroScrim} />
          <DEvolution />
          <DStats />
          <DServices />
          <DGallery />
          <DFeatures />
          <DMap />
          <DFaq />
          <DContact onQuote={() => setQuoteOpen(true)} />
          <DFooter />

          {track && <TrackingModal waybill={track} onClose={() => setTrack(null)} />}
          {quoteOpen && (
            <div onClick={() => setQuoteOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 100,
              background: 'rgba(10,9,8,.7)', backdropFilter: 'blur(3px)', display: 'flex',
              alignItems: 'center', justifyContent: 'center', padding: 24, overflowY: 'auto' }}>
              <div onClick={e => e.stopPropagation()} style={{ width: 'min(900px,100%)', position: 'relative' }}>
                <button onClick={() => setQuoteOpen(false)} aria-label="Close" style={{ position: 'absolute',
                  top: -14, right: -14, zIndex: 2, width: 38, height: 38, borderRadius: '50%', border: 0,
                  background: '#fff', cursor: 'pointer', boxShadow: 'var(--sh-lg)', display: 'flex',
                  alignItems: 'center', justifyContent: 'center' }}>
                  <i data-lucide="x" style={{ width: 19, height: 19 }}></i></button>
                <QuoteForm bare={true} />
              </div>
            </div>
          )}

          <TweaksPanel>
            <TweakSection label="Brand" />
            <TweakColor label="Accent colour" value={t.brandColor}
              options={['#DE4632', '#C8102E', '#E2680F', '#B8341F', '#2E7DB2']}
              onChange={(v) => setTweak('brandColor', v)} />
            <TweakSection label="Hero" />
            <TweakSlider label="Image scrim" value={t.heroScrim} min={40} max={94} unit="%"
              onChange={(v) => setTweak('heroScrim', v)} />
            <TweakSection label="Motion" />
            <TweakToggle label="Reduce motion" value={t.reduceMotion}
              onChange={(v) => setTweak('reduceMotion', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // Auto-open the print dialog once the page is rendered, fonts are ready, and lucide icons are drawn.
    (function autoPrint() {
      const ready = Promise.all([
        document.fonts ? document.fonts.ready : Promise.resolve(),
        new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r))),
      ]);
      ready.then(() => {
        if (window.lucide) lucide.createIcons();
        setTimeout(() => window.print(), 700);
      });
    })();
  </script>
</body>
</html>
